<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог исторических объектов</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        #map { height: 650px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card { transition: all 0.3s ease; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important; }
        .object-photo { height: 180px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .header { background: linear-gradient(135deg, #0d6efd, #6610f2); color: white; padding: 20px 0; }
        .modal-body img { max-height: 320px; object-fit: cover; border-radius: 10px; width: 100%; }
    </style>
</head>
<body>
    <header class="header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold">📍 Каталог исторических объектов Казахстана</h1>
            <p class="lead">Интерактивная карта • Редактирование по паролю • Данные в облаке</p>
        </div>
    </header>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Объекты (<span id="count">0</span>)</h4>
            <div>
                <button onclick="clearRoute()" class="btn btn-outline-danger btn-sm me-2">🗑 Очистить маршрут</button>
                <button onclick="toggleEditMode()" id="editModeBtn" class="btn btn-outline-primary btn-sm">🔐 Войти в режим редактирования</button>
                <button onclick="showAddModal()" id="addBtn" class="btn btn-success btn-sm d-none">➕ Добавить объект</button>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <div class="input-group">
                    <span class="input-group-text">🔎</span>
                    <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Поиск по названию или городу...">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-5 col-xl-4">
                <div id="cardsContainer" class="row row-cols-1 g-3 overflow-auto" style="max-height: 650px;"></div>
            </div>
            <div class="col-lg-7 col-xl-8">
                <div id="map"></div>
                <div class="mt-3 p-3 bg-light rounded-3">
                    <h5 class="mb-3">🛤️ Построить маршрут</h5>
                    <div class="row g-3 align-items-end">
                        <div class="col-md-5"><label class="form-label">Старт</label><select id="startSelect" class="form-select"></select></div>
                        <div class="col-md-5"><label class="form-label">Финиш</label><select id="endSelect" class="form-select"></select></div>
                        <div class="col-md-2"><button onclick="buildRoute()" class="btn btn-primary w-100">🚀 Построить</button></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно информации -->
    <div class="modal fade" id="infoModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button onclick="goToObjectFromModal()" class="btn btn-primary">📍 Показать на карте</button>
                    <button id="editInModalBtn" onclick="hideInfoAndEdit()" class="btn btn-warning d-none">✏️ Редактировать</button>
                    <button id="deleteInModalBtn" onclick="deleteCurrentObject()" class="btn btn-danger d-none">🗑 Удалить</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно добавления/редактирования -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addModalTitle">➕ Добавить объект</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addForm">
                        <div class="mb-3"><label>Название <span class="text-danger">*</span></label><input type="text" id="newName" class="form-control" required></div>
                        <div class="mb-3"><label>Местоположение <span class="text-danger">*</span></label><input type="text" id="newLocation" class="form-control" required></div>
                        <div class="row">
                            <div class="col-6 mb-3"><label>Широта (lat) <span class="text-danger">*</span></label><input type="number" id="newLat" step="0.000001" class="form-control" required></div>
                            <div class="col-6 mb-3"><label>Долгота (lng) <span class="text-danger">*</span></label><input type="number" id="newLng" step="0.000001" class="form-control" required></div>
                        </div>
                        <div class="mb-3"><label>Ссылка на фото</label><input type="url" id="newPhoto" class="form-control"></div>
                        <div class="mb-3"><label>Описание <span class="text-danger">*</span></label><textarea id="newDescription" class="form-control" rows="5" required></textarea></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button onclick="saveObject()" class="btn btn-success">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Окно ввода пароля -->
    <div class="modal fade" id="passwordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5>🔐 Режим редактирования</h5></div>
                <div class="modal-body">
                    <p>Введите пароль:</p>
                    <input type="password" id="passwordInput" class="form-control" placeholder="Пароль">
                </div>
                <div class="modal-footer">
                    <button onclick="checkPassword()" class="btn btn-primary">Войти</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDc_Enuh24ep2DjeTcahKj4ZTVabY6rx8c",
          authDomain: "uncle-bob-4bf8d.firebaseapp.com",
          databaseURL: "https://uncle-bob-4bf8d-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "uncle-bob-4bf8d",
          storageBucket: "uncle-bob-4bf8d.firebasestorage.app",
          messagingSenderId: "989814701198",
          appId: "1:989814701198:web:cd9df2951424c8721edddf",
          measurementId: "G-WJJY8EZ4FZ"
        };

        const PASSWORD = "admin";

        let firebaseApp, db, objectsRef;
        let objects = [];
        let map, markers = {}, routeControl = null;
        let currentObjectKey = null;
        let editMode = false;

        function initFirebase() {
            firebaseApp = firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            objectsRef = db.ref('historicalObjects');
        }

        function loadObjects() {
            objectsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                objects = data ? Object.keys(data).map(key => ({ key, ...data[key] })) : [];

                if (objects.length === 0) {
                    seedInitialData();
                    return;
                }
                refreshMapAndCards();
            });
        }

        function seedInitialData() {
            const initial = [ /* те же 5 базовых объектов */ 
                { name: "Мавзолей Ходжи Ахмеда Ясави", location: "Туркестан", lat: 43.2928, lng: 68.2747, photo: "https://picsum.photos/id/1015/800/600", description: "Один из самых значимых памятников тюркской архитектуры XIII–XIV вв. Объект Всемирного наследия ЮНЕСКО." },
                { name: "Байтерек", location: "Астана", lat: 51.1283, lng: 71.4306, photo: "https://picsum.photos/id/1016/800/600", description: "Символ современной Астаны. Башня высотой 97 метров." },
                { name: "Хан Шатыр", location: "Астана", lat: 51.1322, lng: 71.4047, photo: "https://picsum.photos/id/133/800/600", description: "Самый большой шатёр в мире." },
                { name: "Мечеть Нур-Астана", location: "Астана", lat: 51.1406, lng: 71.4703, photo: "https://picsum.photos/id/201/800/600", description: "Одна из крупнейших мечетей Центральной Азии." },
                { name: "Ак-Орда", location: "Астана", lat: 51.1219, lng: 71.4378, photo: "https://picsum.photos/id/251/800/600", description: "Официальная резиденция Президента Республики Казахстан." }
            ];

            const updates = {};
            initial.forEach(obj => {
                const newKey = objectsRef.push().key;
                updates[newKey] = obj;
            });
            objectsRef.update(updates);
        }

        function refreshMapAndCards() {
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};

            objects.forEach(obj => {
                const marker = L.marker([obj.lat, obj.lng]).addTo(map);
                marker.bindPopup(`<b>${obj.name}</b><br>${obj.location}`);
                markers[obj.key] = marker;
            });

            renderCards();
            populateSelects();
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            document.getElementById('count').textContent = objects.length;

            objects.forEach(obj => {
                const card = document.createElement('div');
                card.className = 'col-12';
                card.innerHTML = `
                    <div class="card h-100 shadow-sm">
                        <img src="${obj.photo}" class="object-photo w-100" alt="${obj.name}">
                        <div class="card-body">
                            <h6 class="card-title">${obj.name}</h6>
                            <p class="text-muted small">${obj.location}</p>
                            <p class="card-text small">${obj.description.substring(0, 110)}...</p>
                        </div>
                    </div>`;
                card.onclick = () => showInfoModal(obj);
                container.appendChild(card);
            });
        }

        function showInfoModal(obj) {
            currentObjectKey = obj.key;
            document.getElementById('modalTitle').textContent = obj.name;
            document.getElementById('modalBody').innerHTML = `
                <img src="${obj.photo}" class="mb-3">
                <p><strong>Местоположение:</strong> ${obj.location}</p>
                <p><strong>Координаты:</strong> ${obj.lat}, ${obj.lng}</p>
                <p>${obj.description}</p>
            `;

            const editBtn = document.getElementById('editInModalBtn');
            const deleteBtn = document.getElementById('deleteInModalBtn');
            editBtn.classList.toggle('d-none', !editMode);
            deleteBtn.classList.toggle('d-none', !editMode);

            new bootstrap.Modal(document.getElementById('infoModal')).show();
        }

        window.goToObjectFromModal = function() {
            const obj = objects.find(o => o.key === currentObjectKey);
            if (!obj) return;
            bootstrap.Modal.getInstance(document.getElementById('infoModal')).hide();
            map.flyTo([obj.lat, obj.lng], 16);
            setTimeout(() => markers[obj.key]?.openPopup(), 800);
        };

        window.hideInfoAndEdit = function() {
            bootstrap.Modal.getInstance(document.getElementById('infoModal')).hide();
            setTimeout(() => showEditModal(currentObjectKey), 400);
        };

        function showEditModal(key) {
            const obj = objects.find(o => o.key === key);
            if (!obj) return;
            currentObjectKey = key;
            document.getElementById('addModalTitle').textContent = '✏️ Редактировать объект';
            document.getElementById('newName').value = obj.name;
            document.getElementById('newLocation').value = obj.location;
            document.getElementById('newLat').value = obj.lat;
            document.getElementById('newLng').value = obj.lng;
            document.getElementById('newPhoto').value = obj.photo || '';
            document.getElementById('newDescription').value = obj.description;
            new bootstrap.Modal(document.getElementById('addModal')).show();
        }

        window.deleteCurrentObject = function() {
            if (confirm('Удалить объект навсегда?')) {
                objectsRef.child(currentObjectKey).remove();
                bootstrap.Modal.getInstance(document.getElementById('infoModal')).hide();
            }
        };

        function showAddModal() {
            currentObjectKey = null;
            document.getElementById('addForm').reset();
            document.getElementById('addModalTitle').textContent = '➕ Добавить новый объект';
            new bootstrap.Modal(document.getElementById('addModal')).show();
        }

        window.saveObject = function() {
            const name = document.getElementById('newName').value.trim();
            const location = document.getElementById('newLocation').value.trim();
            const lat = parseFloat(document.getElementById('newLat').value);
            const lng = parseFloat(document.getElementById('newLng').value);
            const photo = document.getElementById('newPhoto').value.trim();
            const description = document.getElementById('newDescription').value.trim();

            if (!name || !location || isNaN(lat) || isNaN(lng) || !description) {
                alert('Заполните все обязательные поля!');
                return;
            }

            const objData = { name, location, lat, lng, photo: photo || `https://picsum.photos/id/${Math.floor(Math.random()*900)+100}/800/600`, description };

            const modal = bootstrap.Modal.getInstance(document.getElementById('addModal'));

            if (currentObjectKey) {
                objectsRef.child(currentObjectKey).update(objData)
                    .then(() => { alert('✅ Объект успешно обновлён!'); modal.hide(); })
                    .catch(err => alert('❌ Ошибка сохранения: ' + err.message));
            } else {
                objectsRef.push(objData)
                    .then(() => { alert('✅ Новый объект успешно добавлен!'); modal.hide(); })
                    .catch(err => alert('❌ Ошибка добавления: ' + err.message));
            }
        };

        function toggleEditMode() {
            if (editMode) {
                editMode = false;
                document.getElementById('addBtn').classList.add('d-none');
                document.getElementById('editModeBtn').innerHTML = '🔐 Войти в режим редактирования';
                alert('Режим редактирования выключен');
            } else {
                document.getElementById('passwordInput').value = '';
                new bootstrap.Modal(document.getElementById('passwordModal')).show();
            }
        }

        window.checkPassword = function() {
            if (document.getElementById('passwordInput').value === PASSWORD) {
                editMode = true;
                bootstrap.Modal.getInstance(document.getElementById('passwordModal')).hide();
                document.getElementById('addBtn').classList.remove('d-none');
                document.getElementById('editModeBtn').innerHTML = '🚪 Выйти из режима редактирования';
                alert('✅ Режим редактирования включён!');
            } else {
                alert('❌ Неправильный пароль');
            }
        };

        function initMap() {
            map = L.map('map').setView([51.1694, 71.4491], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map);
        }

        function populateSelects() {
            const start = document.getElementById('startSelect');
            const end = document.getElementById('endSelect');
            start.innerHTML = end.innerHTML = '<option value="">Выберите...</option>';
            objects.forEach(obj => {
                const opt = `<option value="${obj.key}">${obj.name} (${obj.location})</option>`;
                start.innerHTML += opt;
                end.innerHTML += opt;
            });
        }

        window.buildRoute = function () {
            const startKey = document.getElementById('startSelect').value;
            const endKey = document.getElementById('endSelect').value;
            if (!startKey || !endKey) return alert('Выберите точки!');
            if (startKey === endKey) return alert('Выберите разные точки!');

            if (routeControl) map.removeControl(routeControl);

            const startObj = objects.find(o => o.key === startKey);
            const endObj = objects.find(o => o.key === endKey);

            routeControl = L.Routing.control({
                waypoints: [L.latLng(startObj.lat, startObj.lng), L.latLng(endObj.lat, endObj.lng)],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: { styles: [{ color: '#0d6efd', weight: 6 }] },
                showAlternatives: true,
                fitSelectedRoutes: true
            }).addTo(map);
        };

        window.clearRoute = function () {
            if (routeControl) map.removeControl(routeControl);
            routeControl = null;
        };

        window.onload = function () {
            initFirebase();
            initMap();
            loadObjects();
            console.log('%c✅ Сайт исправлен! Пароль: admin', 'color:#0d6efd;font-size:16px');
        };
    </script>

    <footer class="text-center py-4 text-muted small">
        Данные хранятся в Firebase • Проектная работа
    </footer>
</body>
</html>
