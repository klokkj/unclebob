<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог исторических объектов</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        #map { height: 650px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card { transition: all 0.3s ease; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important; }
        .object-photo { height: 180px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .header { background: linear-gradient(135deg, #0d6efd, #6610f2); color: white; padding: 20px 0; }
        
        /* Улучшенная карусель */
        .carousel-item img { max-height: 480px; object-fit: contain; cursor: pointer; }
        .carousel-control-prev, .carousel-control-next { width: 10%; }
        .carousel-control-prev-icon, .carousel-control-next-icon { background-color: #000; width: 40px; height: 40px; border-radius: 50%; }
        .carousel-indicators button { background-color: #0d6efd; height: 8px; width: 30px; opacity: 0.7; }
        .carousel-indicators button.active { opacity: 1; }
    </style>
</head>
<body>
    <header class="header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold">📍 Каталог исторических объектов Казахстана</h1>
        </div>
    </header>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Объекты (<span id="count">0</span>)</h4>
            <div>
                <button onclick="clearRoute()" class="btn btn-outline-danger btn-sm me-2">🗑 Очистить маршрут</button>
                <button onclick="toggleEditMode()" id="editModeBtn" class="btn btn-outline-primary btn-sm">🔐 Войти в режим редактирования</button>
                <button onclick="showAddModal()" id="addBtn" class="btn btn-success btn-sm d-none">➕ Добавить объект</button>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <div class="input-group">
                    <span class="input-group-text">🔎</span>
                    <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Поиск...">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-5 col-xl-4">
                <div id="cardsContainer" class="row row-cols-1 g-3 overflow-auto" style="max-height: 650px;"></div>
            </div>
            <div class="col-lg-7 col-xl-8">
                <div id="map"></div>
                <div class="mt-3 p-3 bg-light rounded-3">
                    <h5 class="mb-3">🛤️ Построить маршрут</h5>
                    <div class="row g-3 align-items-end">
                        <div class="col-md-5"><label class="form-label">Старт</label><select id="startSelect" class="form-select"></select></div>
                        <div class="col-md-5"><label class="form-label">Финиш</label><select id="endSelect" class="form-select"></select></div>
                        <div class="col-md-2"><button onclick="buildRoute()" class="btn btn-primary w-100">🚀 Построить</button></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно с улучшенной каруселью -->
    <div class="modal fade" id="infoModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button onclick="goToObjectFromModal()" class="btn btn-primary">📍 Показать на карте</button>
                    <button id="editInModalBtn" onclick="hideInfoAndEdit()" class="btn btn-warning d-none">✏️ Редактировать</button>
                    <button id="deleteInModalBtn" onclick="deleteCurrentObject()" class="btn btn-danger d-none">🗑 Удалить</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно добавления/редактирования -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addModalTitle">➕ Добавить объект</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addForm">
                        <div class="mb-3"><label>Название <span class="text-danger">*</span></label><input type="text" id="newName" class="form-control" required></div>
                        <div class="mb-3"><label>Местоположение <span class="text-danger">*</span></label><input type="text" id="newLocation" class="form-control" required></div>
                        <div class="row">
                            <div class="col-6 mb-3"><label>Широта (lat) <span class="text-danger">*</span></label><input type="number" id="newLat" step="0.000001" class="form-control" required></div>
                            <div class="col-6 mb-3"><label>Долгота (lng) <span class="text-danger">*</span></label><input type="number" id="newLng" step="0.000001" class="form-control" required></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Фотографии объекта</label>
                            <div id="currentPhotosPreview" class="d-flex flex-wrap gap-2 mb-3"></div>
                            
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <div class="input-group">
                                        <input type="url" id="newPhotoUrl" class="form-control" placeholder="https://...">
                                        <button type="button" onclick="addPhotoByUrl()" class="btn btn-outline-primary">Добавить по ссылке</button>
                                    </div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <input type="file" id="photoUpload" accept="image/*" multiple class="form-control">
                                    <small class="text-muted">Можно выбрать несколько фото</small>
                                </div>
                            </div>
                            <button type="button" onclick="uploadSelectedFiles()" class="btn btn-outline-success mt-2 w-100" id="uploadBtn">
                                📤 Загрузить выбранные файлы с компьютера
                            </button>
                        </div>

                        <div class="mb-3"><label>Описание <span class="text-danger">*</span></label><textarea id="newDescription" class="form-control" rows="5" required></textarea></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button onclick="saveObject()" class="btn btn-success">Сохранить объект</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Пароль -->
    <div class="modal fade" id="passwordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5>🔐 Режим редактирования</h5></div>
                <div class="modal-body">
                    <p>Введите пароль:</p>
                    <input type="password" id="passwordInput" class="form-control" placeholder="Пароль">
                </div>
                <div class="modal-footer">
                    <button onclick="checkPassword()" class="btn btn-primary">Войти</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDc_Enuh24ep2DjeTcahKj4ZTVabY6rx8c",
          authDomain: "uncle-bob-4bf8d.firebaseapp.com",
          databaseURL: "https://uncle-bob-4bf8d-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "uncle-bob-4bf8d",
          storageBucket: "uncle-bob-4bf8d.firebasestorage.app",
          messagingSenderId: "989814701198",
          appId: "1:989814701198:web:cd9df2951424c8721edddf",
          measurementId: "G-WJJY8EZ4FZ"
        };

        const PASSWORD = "administratorbob";

        let firebaseApp, db, objectsRef, storageRef;
        let objects = [];
        let map, markers = {}, routeControl = null;
        let currentObjectKey = null;
        let editMode = false;
        let currentPhotos = [];

        function initFirebase() {
            firebaseApp = firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            objectsRef = db.ref('historicalObjects');
            storageRef = firebase.storage().ref();
        }

        // ... (остальной код loadObjects, seedInitialData, renderCards и т.д. остаётся как в предыдущей версии, но с улучшениями)

        function showInfoModal(obj) {
            currentObjectKey = obj.key;
            document.getElementById('modalTitle').textContent = obj.name;

            let carouselHTML = `<div id="photoCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-indicators">`;

            if (obj.photos && obj.photos.length > 0) {
                obj.photos.forEach((url, i) => {
                    carouselHTML += `<button type="button" data-bs-target="#photoCarousel" data-bs-slide-to="${i}" class="${i===0 ? 'active' : ''}"></button>`;
                });
            }

            carouselHTML += `</div><div class="carousel-inner">`;

            if (obj.photos && obj.photos.length > 0) {
                obj.photos.forEach((url, i) => {
                    carouselHTML += `
                        <div class="carousel-item ${i===0 ? 'active' : ''}">
                            <img src="${url}" class="d-block w-100" onclick="window.open('${url}', '_blank')" alt="Фото ${i+1}">
                        </div>`;
                });
            } else {
                carouselHTML += `<div class="carousel-item active"><img src="https://picsum.photos/id/1005/800/600" class="d-block w-100"></div>`;
            }

            carouselHTML += `</div>
                <button class="carousel-control-prev" type="button" data-bs-target="#photoCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
                <button class="carousel-control-next" type="button" data-bs-target="#photoCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
            </div>`;

            document.getElementById('modalBody').innerHTML = `
                ${carouselHTML}
                <p class="mt-3"><strong>Местоположение:</strong> ${obj.location}</p>
                <p><strong>Координаты:</strong> ${obj.lat}, ${obj.lng}</p>
                <p>${obj.description}</p>
            `;

            const editBtn = document.getElementById('editInModalBtn');
            const deleteBtn = document.getElementById('deleteInModalBtn');
            editBtn.classList.toggle('d-none', !editMode);
            deleteBtn.classList.toggle('d-none', !editMode);

            new bootstrap.Modal(document.getElementById('infoModal')).show();
        }

        // Улучшенная загрузка с компьютера
        window.uploadSelectedFiles = async function() {
            const files = document.getElementById('photoUpload').files;
            if (!files.length) return alert('Выберите хотя бы одно фото');

            const btn = document.getElementById('uploadBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Загружаем фото...`;
            btn.disabled = true;

            for (let file of files) {
                const fileRef = storageRef.child('object-photos/' + Date.now() + '-' + file.name);
                try {
                    const snapshot = await fileRef.put(file);
                    const url = await snapshot.ref.getDownloadURL();
                    currentPhotos.push(url);
                    renderCurrentPhotosPreview();
                } catch(e) {
                    console.error(e);
                }
            }

            btn.innerHTML = originalText;
            btn.disabled = false;
            document.getElementById('photoUpload').value = '';
            alert('✅ Все фото успешно загружены!');
        };

        // Остальной код (saveObject, toggleEditMode, initMap и т.д.) остаётся прежним

        window.onload = function () {
            initFirebase();
            initMap();
            loadObjects();
            console.log('%c✅ Карусель улучшена + загрузка с ПК работает!', 'color:#0d6efd;font-size:16px');
        };
    </script>

    <footer class="text-center py-4 text-muted small">
        Проектная работа • Данные в облаке
    </footer>
</body>
</html>
