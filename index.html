<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог исторических объектов</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        #map { height: 650px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card { transition: all 0.3s ease; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important; }
        .object-photo { height: 180px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .header { background: linear-gradient(135deg, #0d6efd, #6610f2); color: white; padding: 20px 0; }
        
        .carousel-control-prev, .carousel-control-next { width: 70px; height: 70px; background: rgba(0,0,0,0.4); border-radius: 50%; top: 50%; transform: translateY(-50%); }
        .carousel-control-prev:hover, .carousel-control-next:hover { background: rgba(13,110,253,0.9); }
        .carousel-indicators { bottom: 15px; }
        .carousel-item img { max-height: 480px; object-fit: contain; cursor: zoom-in; }
        .photo-preview { max-height: 120px; object-fit: cover; border-radius: 8px; cursor: pointer; }

        .route-item { transition: all 0.2s; }
        #routeStats { font-size: 1.1rem; font-weight: 600; }
    </style>
</head>
<body>
    <header class="header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold">📍 Каталог исторических объектов Казахстана</h1>
        </div>
    </header>
    
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Объекты (<span id="count">0</span>)</h4>
            <div>
                <button onclick="clearRoute()" class="btn btn-outline-danger btn-sm me-2">🗑 Очистить маршрут</button>
                <button onclick="toggleEditMode()" id="editModeBtn" class="btn btn-outline-primary btn-sm">🔐 Войти в режим редактирования</button>
                <button onclick="showAddModal()" id="addBtn" class="btn btn-success btn-sm d-none">➕ Добавить объект</button>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <div class="input-group">
                    <span class="input-group-text">🔎</span>
                    <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Поиск по названию или городу...">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-5 col-xl-4">
                <div id="cardsContainer" class="row row-cols-1 g-3 overflow-auto" style="max-height: 650px;"></div>
            </div>
            <div class="col-lg-7 col-xl-8">
                <div id="map"></div>

                <!-- БЛОК СЛОЖНОГО МАРШРУТА -->
                <div class="mt-3 p-3 bg-light rounded-3">
                    <h5 class="mb-3">🛤️ Сложный маршрут (несколько объектов)</h5>
                    <div id="routeList" class="mb-3"></div>
                    
                    <!-- Статистика расстояния и времени -->
                    <div id="routeStats" class="alert alert-info d-none"></div>
                    
                    <button onclick="buildMultiRoute()" class="btn btn-primary w-100 mb-2">🚀 Построить маршрут по всем точкам</button>
                    <small class="text-muted">Добавляйте объекты → меняйте порядок ↑↓ → смотрите расстояние и время</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div class="modal fade" id="infoModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button onclick="goToObjectFromModal()" class="btn btn-primary">📍 Показать на карте</button>
                    <button onclick="addCurrentToRouteFromModal()" class="btn btn-success">➕ Добавить в маршрут</button>
                    <button id="editInModalBtn" onclick="hideInfoAndEdit()" class="btn btn-warning d-none">✏️ Редактировать</button>
                    <button id="deleteInModalBtn" onclick="deleteCurrentObject()" class="btn btn-danger d-none">🗑 Удалить</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="lightboxModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content bg-dark border-0">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-0">
                    <img id="lightboxImage" src="" alt="Увеличенное фото" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addModalTitle">➕ Добавить объект</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addForm">
                        <div class="mb-3"><label>Название <span class="text-danger">*</span></label><input type="text" id="newName" class="form-control" required></div>
                        <div class="mb-3"><label>Местоположение <span class="text-danger">*</span></label><input type="text" id="newLocation" class="form-control" required></div>
                        <div class="row">
                            <div class="col-6 mb-3"><label>Широта <span class="text-danger">*</span></label><input type="number" id="newLat" step="0.000001" class="form-control" required></div>
                            <div class="col-6 mb-3"><label>Долгота <span class="text-danger">*</span></label><input type="number" id="newLng" step="0.000001" class="form-control" required></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Фотографии объекта (по ссылке)</label>
                            <div id="currentPhotosPreview" class="d-flex flex-wrap gap-2 mb-3"></div>
                            <div class="input-group">
                                <input type="url" id="newPhotoUrl" class="form-control" placeholder="https://example.com/photo.jpg">
                                <button type="button" onclick="addPhotoByUrl()" class="btn btn-outline-primary">Добавить фото</button>
                            </div>
                        </div>
                        <div class="mb-3"><label>Описание <span class="text-danger">*</span></label><textarea id="newDescription" class="form-control" rows="5" required></textarea></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button onclick="saveObject()" class="btn btn-success">Сохранить объект</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="passwordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5>🔐 Режим редактирования</h5></div>
                <div class="modal-body">
                    <p>Введите пароль:</p>
                    <input type="password" id="passwordInput" class="form-control" placeholder="Пароль">
                </div>
                <div class="modal-footer">
                    <button onclick="checkPassword()" class="btn btn-primary">Войти</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=85b46bce-2045-4591-9a70-488a56b73e77&lang=ru_RU"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDc_Enuh24ep2DjeTcahKj4ZTVabY6rx8c",
          authDomain: "uncle-bob-4bf8d.firebaseapp.com",
          databaseURL: "https://uncle-bob-4bf8d-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "uncle-bob-4bf8d",
          messagingSenderId: "989814701198",
          appId: "1:989814701198:web:cd9df2951424c8721edddf"
        };

        const PASSWORD = "administratorbob";
        let firebaseApp, db, objectsRef;
        let objects = [];
        let map, markers = {};
        let routeControl = null;
        let currentObjectKey = null;
        let editMode = false;
        let currentPhotos = [];
        let routePoints = []; // массив точек сложного маршрута

        function initFirebase() {
            firebaseApp = firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            objectsRef = db.ref('historicalObjects');
        }

        function loadEditMode() {
            if (localStorage.getItem('editMode') === 'true') {
                editMode = true;
                document.getElementById('addBtn').classList.remove('d-none');
                document.getElementById('editModeBtn').innerHTML = '🚪 Выйти из режима редактирования';
            }
        }

        function initMap() {
            ymaps.ready(() => {
                map = new ymaps.Map('map', {
                    center: [51.1694, 71.4491],
                    zoom: 6,
                    controls: ['zoomControl', 'fullscreenControl', 'rulerControl', 'searchControl']
                });
                refreshMapAndCards();
            });
        }

        function loadObjects() {
            objectsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                objects = data ? Object.keys(data).map(key => ({ key, ...data[key] })) : [];
                if (objects.length === 0) { seedInitialData(); return; }
                refreshMapAndCards();
            });
        }

        function seedInitialData() {
            const initial = [
                { name: "Мавзолей Ходжи Ахмеда Ясави", location: "Туркестан", lat: 43.2928, lng: 68.2747, photos: ["https://picsum.photos/id/1015/800/600", "https://picsum.photos/id/1016/800/600"], description: "Один из самых значимых памятников тюркской архитектуры XIII–XIV вв." },
                { name: "Байтерек", location: "Астана", lat: 51.1283, lng: 71.4306, photos: ["https://picsum.photos/id/1016/800/600"], description: "Символ современной Астаны." },
                { name: "Хан Шатыр", location: "Астана", lat: 51.1322, lng: 71.4047, photos: ["https://picsum.photos/id/133/800/600", "https://picsum.photos/id/201/800/600"], description: "Самый большой шатёр в мире." },
                { name: "Мечеть Нур-Астана", location: "Астана", lat: 51.1406, lng: 71.4703, photos: ["https://picsum.photos/id/201/800/600"], description: "Одна из крупнейших мечетей Центральной Азии." },
                { name: "Ак-Орда", location: "Астана", lat: 51.1219, lng: 71.4378, photos: ["https://picsum.photos/id/251/800/600"], description: "Официальная резиденция Президента." }
            ];
            const updates = {};
            initial.forEach(obj => {
                const newKey = objectsRef.push().key;
                updates[newKey] = obj;
            });
            objectsRef.update(updates);
        }

        function refreshMapAndCards() {
            if (map) map.geoObjects.removeAll();
            markers = {};
            objects.forEach(obj => {
                const placemark = new ymaps.Placemark([obj.lat, obj.lng], {
                    hintContent: obj.name,
                    balloonContentHeader: obj.name,
                    balloonContentBody: `<strong>${obj.location}</strong><br>${obj.description.substring(0, 120)}...`
                }, { preset: 'islands#blueDotIcon' });
                placemark.events.add('click', () => showInfoModal(obj));
                map.geoObjects.add(placemark);
                markers[obj.key] = placemark;
            });
            renderCards();
            renderRouteList();
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            document.getElementById('count').textContent = objects.length;
            objects.forEach(obj => {
                const firstPhoto = obj.photos && obj.photos.length > 0 ? obj.photos[0] : 'https://picsum.photos/id/1005/800/600';
                const extra = obj.photos && obj.photos.length > 1 ? `<span class="badge bg-primary position-absolute top-0 end-0 m-2">+${obj.photos.length-1}</span>` : '';
                const card = document.createElement('div');
                card.className = 'col-12';
                card.innerHTML = `
                    <div class="card h-100 shadow-sm position-relative">
                        <img src="${firstPhoto}" class="object-photo w-100" alt="${obj.name}">
                        ${extra}
                        <div class="card-body">
                            <h6 class="card-title">${obj.name}</h6>
                            <p class="text-muted small">${obj.location}</p>
                            <p class="card-text small">${obj.description.substring(0, 110)}...</p>
                            <button onclick="event.stopImmediatePropagation(); addToRoute('${obj.key}');" class="btn btn-sm btn-outline-success w-100 mt-2">➕ Добавить в маршрут</button>
                        </div>
                    </div>`;
                card.onclick = (e) => { if (!e.target.closest('button')) showInfoModal(obj); };
                container.appendChild(card);
            });
        }

        function addToRoute(key) {
            const obj = objects.find(o => o.key === key);
            if (!obj) return;
            if (routePoints.find(p => p.key === key)) return alert('Этот объект уже в маршруте!');
            routePoints.push({ key: obj.key, name: obj.name, location: obj.location, lat: obj.lat, lng: obj.lng });
            renderRouteList();
            alert(`✅ ${obj.name} добавлен в маршрут`);
        }

        window.addCurrentToRouteFromModal = function() {
            if (currentObjectKey) addToRoute(currentObjectKey);
            bootstrap.Modal.getInstance(document.getElementById('infoModal')).hide();
        };

        function renderRouteList() {
            const container = document.getElementById('routeList');
            container.innerHTML = '';
            if (routePoints.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-3">Пока нет точек в маршруте.<br>Нажмите «Добавить в маршрут» на карточках объектов.</p>';
                document.getElementById('routeStats').classList.add('d-none');
                return;
            }
            const ul = document.createElement('ul');
            ul.className = 'list-group';
            routePoints.forEach((point, index) => {
                const li = document.createElement('li');
                li.className = 'list-group-item route-item d-flex justify-content-between align-items-center';
                li.innerHTML = `
                    <span><strong>${index + 1}.</strong> ${point.name} <small class="text-muted">(${point.location})</small></span>
                    <div>
                        <button onclick="moveRoutePoint(${index}, -1)" class="btn btn-sm btn-outline-secondary me-1">↑</button>
                        <button onclick="moveRoutePoint(${index}, 1)" class="btn btn-sm btn-outline-secondary me-1">↓</button>
                        <button onclick="removeFromRoute(${index})" class="btn btn-sm btn-outline-danger">✕</button>
                    </div>`;
                ul.appendChild(li);
            });
            container.appendChild(ul);
        }

        window.moveRoutePoint = function(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= routePoints.length) return;
            [routePoints[index], routePoints[newIndex]] = [routePoints[newIndex], routePoints[index]];
            renderRouteList();
        };

        window.removeFromRoute = function(index) {
            routePoints.splice(index, 1);
            renderRouteList();
        };

        window.buildMultiRoute = function() {
            if (routePoints.length < 2) return alert('Добавьте минимум 2 точки в маршрут!');

            const referencePoints = routePoints.map(p => [p.lat, p.lng]);

            if (routeControl) map.geoObjects.remove(routeControl);

            routeControl = new ymaps.multiRouter.MultiRoute({
                referencePoints: referencePoints,
                params: { results: 1 }
            }, {
                boundsAutoApply: true,
                wayPointStartIconColor: '#1e88e5',
                wayPointFinishIconColor: '#d32f2f',
                wayPointIconColor: '#43a047'
            });

            map.geoObjects.add(routeControl);

            // === РАСЧЁТ ВРЕМЕНИ И РАССТОЯНИЯ ===
            routeControl.model.events.add('update', () => {
                const activeRoute = routeControl.getActiveRoute();
                if (activeRoute) {
                    const distanceText = activeRoute.properties.get('distance').text;   // например "245 км"
                    const durationText = activeRoute.properties.get('duration').text;   // например "3 ч 15 мин"
                    document.getElementById('routeStats').innerHTML = `
                        <i class="bi bi-road"></i> <strong>Общее расстояние:</strong> ${distanceText}<br>
                        <i class="bi bi-clock"></i> <strong>Примерное время в пути:</strong> ${durationText}
                    `;
                    document.getElementById('routeStats').classList.remove('d-none');
                }
            });
        };

        window.clearRoute = function() {
            routePoints = [];
            if (routeControl) {
                map.geoObjects.remove(routeControl);
                routeControl = null;
            }
            renderRouteList();
            document.getElementById('routeStats').classList.add('d-none');
        };

        // ==================== ОСТАЛЬНЫЕ ФУНКЦИИ ====================
        function showInfoModal(obj) {
            currentObjectKey = obj.key;
            document.getElementById('modalTitle').textContent = obj.name;
            let carouselHTML = `<div id="photoCarousel" class="carousel slide" data-bs-ride="carousel">`;
            if (obj.photos && obj.photos.length > 0) {
                let indicators = `<div class="carousel-indicators">`;
                obj.photos.forEach((_, i) => indicators += `<button type="button" data-bs-target="#photoCarousel" data-bs-slide-to="${i}" class="${i===0?'active':''}"></button>`);
                indicators += `</div>`;
                carouselHTML += indicators + `<div class="carousel-inner">`;
                obj.photos.forEach((url, i) => {
                    carouselHTML += `<div class="carousel-item ${i===0?'active':''}"><img src="${url}" class="d-block w-100" onclick="enlargeImage('${url}')"></div>`;
                });
                carouselHTML += `</div>`;
            } else {
                carouselHTML += `<div class="carousel-item active"><img src="https://picsum.photos/id/1005/800/600" onclick="enlargeImage('https://picsum.photos/id/1005/800/600')"></div>`;
            }
            carouselHTML += `<button class="carousel-control-prev" type="button" data-bs-target="#photoCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button><button class="carousel-control-next" type="button" data-bs-target="#photoCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button></div>`;
            document.getElementById('modalBody').innerHTML = `${carouselHTML}<p class="mt-3"><strong>Местоположение:</strong> ${obj.location}</p><p><strong>Координаты:</strong> ${obj.lat}, ${obj.lng}</p><p>${obj.description}</p>`;
            document.getElementById('editInModalBtn').classList.toggle('d-none', !editMode);
            document.getElementById('deleteInModalBtn').classList.toggle('d-none', !editMode);
            new bootstrap.Modal(document.getElementById('infoModal')).show();
        }

        window.enlargeImage = function(src) {
            document.getElementById('lightboxImage').src = src;
            new bootstrap.Modal(document.getElementById('lightboxModal')).show();
        };

        window.goToObjectFromModal = function() {
            const obj = objects.find(o => o.key === currentObjectKey);
            if (!obj) return;
            bootstrap.Modal.getInstance(document.getElementById('infoModal')).hide();
            map.setCenter([obj.lat, obj.lng], 16);
        };

        window.hideInfoAndEdit = function() {
            bootstrap.Modal.getInstance(document.getElementById('infoModal')).hide();
            setTimeout(() => showEditModal(currentObjectKey), 400);
        };

        function showEditModal(key) {
            const obj = objects.find(o => o.key === key);
            if (!obj) return;
            currentObjectKey = key;
            currentPhotos = obj.photos ? [...obj.photos] : [];
            document.getElementById('addModalTitle').textContent = '✏️ Редактировать объект';
            document.getElementById('newName').value = obj.name;
            document.getElementById('newLocation').value = obj.location;
            document.getElementById('newLat').value = obj.lat;
            document.getElementById('newLng').value = obj.lng;
            document.getElementById('newDescription').value = obj.description;
            renderCurrentPhotosPreview();
            new bootstrap.Modal(document.getElementById('addModal')).show();
        }

        function renderCurrentPhotosPreview() {
            const container = document.getElementById('currentPhotosPreview');
            container.innerHTML = '';
            currentPhotos.forEach((url, index) => {
                const div = document.createElement('div');
                div.className = 'position-relative';
                div.innerHTML = `<img src="${url}" class="photo-preview" onclick="enlargeImage('${url}')"><button onclick="removePhoto(${index});event.stopImmediatePropagation();" class="btn btn-sm btn-danger position-absolute top-0 end-0 m-1">×</button>`;
                container.appendChild(div);
            });
        }

        window.removePhoto = function(index) {
            currentPhotos.splice(index, 1);
            renderCurrentPhotosPreview();
        };

        window.addPhotoByUrl = function() {
            const url = document.getElementById('newPhotoUrl').value.trim();
            if (url) {
                currentPhotos.push(url);
                renderCurrentPhotosPreview();
                document.getElementById('newPhotoUrl').value = '';
            } else alert("Вставьте ссылку на фото!");
        };

        function showAddModal() {
            currentObjectKey = null;
            currentPhotos = [];
            document.getElementById('addForm').reset();
            document.getElementById('addModalTitle').textContent = '➕ Добавить новый объект';
            renderCurrentPhotosPreview();
            new bootstrap.Modal(document.getElementById('addModal')).show();
        }

        window.saveObject = function() {
            const name = document.getElementById('newName').value.trim();
            const location = document.getElementById('newLocation').value.trim();
            const lat = parseFloat(document.getElementById('newLat').value);
            const lng = parseFloat(document.getElementById('newLng').value);
            const description = document.getElementById('newDescription').value.trim();
            if (!name || !location || isNaN(lat) || isNaN(lng) || !description) return alert('Заполните все обязательные поля!');
            const objData = { name, location, lat, lng, photos: currentPhotos.length ? currentPhotos : ["https://picsum.photos/id/1005/800/600"], description };
            const modal = bootstrap.Modal.getInstance(document.getElementById('addModal'));
            if (currentObjectKey) {
                objectsRef.child(currentObjectKey).update(objData).then(() => { alert('✅ Обновлено!'); modal.hide(); });
            } else {
                objectsRef.push(objData).then(() => { alert('✅ Добавлено!'); modal.hide(); });
            }
        };

        function toggleEditMode() {
            if (editMode) {
                editMode = false;
                localStorage.removeItem('editMode');
                document.getElementById('addBtn').classList.add('d-none');
                document.getElementById('editModeBtn').innerHTML = '🔐 Войти в режим редактирования';
            } else {
                document.getElementById('passwordInput').value = '';
                new bootstrap.Modal(document.getElementById('passwordModal')).show();
            }
        }

        window.checkPassword = function() {
            if (document.getElementById('passwordInput').value === PASSWORD) {
                editMode = true;
                localStorage.setItem('editMode', 'true');
                bootstrap.Modal.getInstance(document.getElementById('passwordModal')).hide();
                document.getElementById('addBtn').classList.remove('d-none');
                document.getElementById('editModeBtn').innerHTML = '🚪 Выйти из режима редактирования';
                alert('✅ Режим редактирования включён!');
            } else alert('❌ Неправильный пароль');
        };

        window.deleteCurrentObject = function() {
            if (confirm('Удалить объект навсегда?')) {
                objectsRef.child(currentObjectKey).remove();
                bootstrap.Modal.getInstance(document.getElementById('infoModal')).hide();
            }
        };

        window.onload = function () {
            initFirebase();
            initMap();
            loadEditMode();
            loadObjects();
            console.log('%c✅ Сложный маршрут + расчёт расстояния и времени готов!', 'color:#0d6efd;font-size:16px');
        };
    </script>
</body>
</html>
